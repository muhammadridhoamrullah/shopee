services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: frontend-shopee
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - shopee-network

networks:
  shopee-network:
    external: true
