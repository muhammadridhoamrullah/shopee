name: CI - Lint and Build Check (Next.js)

on:
  push:
    branches: [develop, main]
    paths:
      - "nextjs-shopee/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "nextjs-shopee/**"

defaults:
  run:
    working-directory: nextjs-shopee

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs-shopee/package-lock.json

      - name: Install dependency
        run: npm ci

      - name: Jalankan lint
        run: npm run lint

      - name: Jalankan build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
