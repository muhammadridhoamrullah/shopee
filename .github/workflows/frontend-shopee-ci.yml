name: CI - Lint and Build Check (Frontend Shopee)

on:
  push:
    branches: [develop, main]
    paths:
      - "frontend-shopee/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "frontend-shopee/**"

defaults:
  run:
    working-directory: frontend-shopee

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-shopee/package-lock.json

      - name: Install dependency
        run: npm ci

      - name: Jalankan lint (oxlint)
        run: npm run lint

      - name: Jalankan build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
