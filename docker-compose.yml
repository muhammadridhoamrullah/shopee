services:
  db:
    image: postgres:15.3-alpine
    container_name: db-shopee
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopee
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend-shopee
      dockerfile: Dockerfile.dev
    container_name: backend-shopee
    restart: always
    env_file:
      - ./backend-shopee/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend-shopee:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend-shopee
      dockerfile: Dockerfile.dev
    container_name: frontend-shopee
    restart: always
    env_file:
      - ./frontend-shopee/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-shopee:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  nextjs:
    build:
      context: ./nextjs-shopee
      dockerfile: Dockerfile.dev
    container_name: nextjs-shopee
    restart: always
    env_file:
      - ./nextjs-shopee/.env
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3001:3001"
    volumes:
      - ./nextjs-shopee:/app
      - /app/node_modules

volumes:
  db_data:
